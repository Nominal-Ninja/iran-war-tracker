name: CI

# Runs on every push & PR to main: typecheck + build + Docker image build +
# Trivy security scan. Image is built but NOT pushed — deployment lives in
# deploy.yml so CI stays fast and safe to run on forks/PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # upload SARIF to GitHub Security tab

jobs:
  typecheck-and-build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Build client + server
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker-build-scan:
    name: Docker build & Trivy scan
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: iran-war-tracker:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: iran-war-tracker:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Trivy SARIF report (for GitHub Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: iran-war-tracker:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
